- name: Set up AccelByte AGS CLI
  block:
    - name: Resolve AGS CLI release asset for platform
      ansible.builtin.set_fact:
        ags_asset: "ags-{{ ags_arch_map[ansible_facts['architecture']] }}-{{ ags_os_map[ansible_facts['system']] }}.tar.gz"
      vars:
        ags_arch_map:
          x86_64: x86_64
          aarch64: aarch64
          arm64: aarch64
        ags_os_map:
          Linux: unknown-linux-gnu
          Darwin: apple-darwin
      tags:
        - install
        - ags-cli

    - name: Ensure local bin directory exists
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.local/bin"
        state: directory
        mode: "0755"
      tags:
        - install
        - ags-cli

    - name: Download latest AGS CLI archive
      ansible.builtin.get_url:
        url: "https://github.com/AccelByte/accelbyte-ags-cli/releases/latest/download/{{ ags_asset }}"
        dest: /tmp/ags.tar.gz
        mode: "0644"
        force: true
      tags:
        - install
        - ags-cli

    - name: Extract AGS CLI binary
      ansible.builtin.unarchive:
        src: /tmp/ags.tar.gz
        dest: /tmp
        remote_src: true
        include:
          - ./ags
      tags:
        - install
        - ags-cli

    - name: Install AGS CLI binary
      ansible.builtin.copy:
        src: /tmp/ags
        dest: "{{ ansible_env.HOME }}/.local/bin/ags"
        mode: "0755"
        remote_src: true
      tags:
        - install
        - ags-cli

    - name: Verify AGS CLI
      ansible.builtin.command: "{{ ansible_env.HOME }}/.local/bin/ags --version"
      changed_when: false
      tags:
        - install
        - ags-cli
