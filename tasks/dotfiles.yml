- name: Install stow on Linux
  apt:
    name: stow
    state: present
  become: true
  when: ansible_facts['system'] == "Linux"
  tags:
    - install
    - dotfiles
    - stow
    - linux-only

- name: Install stow on macOS
  community.general.homebrew:
    name: stow
    state: present
  when: ansible_facts['system'] == "Darwin"
  tags:
    - install
    - dotfiles
    - stow
    - macos-only

- name: Ensure .dotfiles directory exists
  file:
    path: "{{ lookup('env', 'HOME') }}/.dotfiles"
    state: directory
    mode: "0700"
  tags:
    - install
    - dotfiles
    - stow

- name: Sync dotfiles from repo (idempotent)
  ansible.builtin.command:
    argv:
      - rsync
      - --archive
      - --delete
      - --checksum
      - --itemize-changes
      - --exclude=.git
      - --exclude=.gitignore
      - --exclude=*.log
      - --delete-excluded
      - "{{ playbook_dir }}/dotfiles/"
      - "{{ lookup('env', 'HOME') }}/.dotfiles/"
  register: dotfiles_rsync
  changed_when: dotfiles_rsync.stdout != ""
  check_mode: false
  when: not ansible_check_mode
  delegate_to: localhost
  tags:
    - install
    - dotfiles
    - stow

- name: Preview dotfiles sync changes in check mode
  ansible.builtin.command:
    argv:
      - rsync
      - --archive
      - --delete
      - --checksum
      - --dry-run
      - --itemize-changes
      - --exclude=.git
      - --exclude=.gitignore
      - --exclude=*.log
      - --delete-excluded
      - "{{ playbook_dir }}/dotfiles/"
      - "{{ lookup('env', 'HOME') }}/.dotfiles/"
  register: dotfiles_rsync_check
  changed_when: dotfiles_rsync_check.stdout != ""
  check_mode: false
  when: ansible_check_mode
  delegate_to: localhost
  tags:
    - install
    - dotfiles
    - stow

- name: Make scripts executable
  file:
    path: "{{ lookup('env', 'HOME') }}/.dotfiles/{{ item }}"
    mode: "0755"
  loop:
    - "install"
    - "stow"
  tags:
    - install
    - dotfiles
    - stow

- name: Run stow to create symlinks
  command: ./stow
  args:
    chdir: "{{ lookup('env', 'HOME') }}/.dotfiles"
  register: stow_output
  changed_when: stow_output.stdout != ""
  tags:
    - install
    - dotfiles
    - stow

- name: Ensure mise zsh shims activation is configured in .zprofile
  blockinfile:
    path: "{{ lookup('env', 'HOME') }}/.zprofile"
    create: true
    marker: "# {mark} ANSIBLE MANAGED BLOCK - mise activation"
    insertafter: EOF
    block: |
      # Resolve mise directly so first shell startup works before PATH is fully initialized.
      if [ -x "$HOME/.local/bin/mise" ]; then
        eval "$("$HOME/.local/bin/mise" activate zsh --shims)"
      elif [ -x "/opt/homebrew/bin/mise" ]; then
        eval "$("/opt/homebrew/bin/mise" activate zsh --shims)"
      elif [ -x "/usr/local/bin/mise" ]; then
        eval "$("/usr/local/bin/mise" activate zsh --shims)"
      elif command -v mise >/dev/null 2>&1; then
        eval "$(mise activate zsh --shims)"
      fi
  tags:
    - install
    - dotfiles
    - stow

- name: Ensure mise shims are available in all zsh shells
  blockinfile:
    path: "{{ lookup('env', 'HOME') }}/.zshenv"
    create: true
    marker: "# {mark} ANSIBLE MANAGED BLOCK - mise shims"
    insertafter: EOF
    block: |
      case ":$PATH:" in
        *":$HOME/.local/share/mise/shims:"*) ;;
        *) export PATH="$HOME/.local/share/mise/shims:$PATH" ;;
      esac
  tags:
    - install
    - dotfiles
    - stow
